<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Komorebi</title>
  </head>
  <body>
    <header class="ef-header">
      <span class="ef-logo" aria-hidden="true">
        <svg viewBox="9 4 92 92" width="22" height="22">
          <defs><clipPath id="ef-pop"><circle cx="55" cy="50" r="42" /></clipPath></defs>
          <circle cx="55" cy="50" r="42" fill="#fdf6e3" />
          <g clip-path="url(#ef-pop)">
            <circle cx="71" cy="33" r="9" fill="#dbbc7f" />
            <path d="M13 64 L31 48 L45 60 L60 44 L74 58 L97 40 L97 92 L13 92 Z" fill="#cfe0b0" />
            <path d="M13 74 L28 60 L42 71 L58 56 L74 70 L97 54 L97 92 L13 92 Z" fill="#a7c080" />
            <path d="M13 84 L26 73 L41 82 L57 70 L73 81 L97 68 L97 92 L13 92 Z" fill="#6f9a5d" />
          </g>
          <circle cx="55" cy="50" r="42" fill="none" stroke="#a7c080" stroke-width="2.4" />
        </svg>
      </span>
      <span class="ef-titles">
        <span class="ef-title">Komorebi</span>
        <span class="ef-sub">for the web</span>
      </span>
      <label class="ef-switch" title="Enable theme">
        <input type="checkbox" id="enabled" />
        <span class="ef-track"><span class="ef-thumb"></span></span>
      </label>
    </header>

    <main class="ef-body">
      <section class="ef-field">
        <div class="ef-label">Appearance</div>
        <div class="ef-seg" role="radiogroup" data-setting="mode">
          <button type="button" role="radio" data-value="sync">Sync</button>
          <button type="button" role="radio" data-value="light">Light</button>
          <button type="button" role="radio" data-value="dark">Dark</button>
        </div>
        <p class="ef-hint" id="mode-hint">Follows your GitHub appearance.</p>
      </section>

      <section class="ef-field">
        <div class="ef-label">Contrast</div>
        <div class="ef-seg" role="radiogroup" data-setting="contrast">
          <button type="button" role="radio" data-value="soft">Soft</button>
          <button type="button" role="radio" data-value="medium">Medium</button>
          <button type="button" role="radio" data-value="hard">Hard</button>
        </div>
      </section>

      <section class="ef-field">
        <div class="ef-label">Sites</div>
        <div class="ef-sites">
          <button type="button" data-site="github">GitHub</button>
          <button type="button" data-site="google">Google</button>
          <button type="button" data-site="x">X</button>
        </div>
        <p class="ef-hint">Turn the theme on or off per site.</p>
      </section>

      <section class="ef-preview" aria-hidden="true">
        <span class="ef-swatch" data-c="bg"></span>
        <span class="ef-swatch" data-c="red"></span>
        <span class="ef-swatch" data-c="orange"></span>
        <span class="ef-swatch" data-c="yellow"></span>
        <span class="ef-swatch" data-c="green"></span>
        <span class="ef-swatch" data-c="aqua"></span>
        <span class="ef-swatch" data-c="blue"></span>
        <span class="ef-swatch" data-c="purple"></span>
      </section>
    </main>

    <footer class="ef-footer">
      <span class="ef-status" id="status">Theme on</span>
      <button type="button" class="ef-reset" id="reset">Reset</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
